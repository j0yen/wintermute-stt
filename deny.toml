# deny.toml — supply-chain policy for autobuilder-scaffolded projects.
# Run: cargo deny check

[graph]
targets = []

[advisories]
version = 2
yanked = "deny"
unmaintained = "workspace"
# whisper-rs 0.13 bundles whisper.cpp 1.7.1 via whisper-rs-sys which pulls in
# cmake-based C/C++ dependencies. Any transitive "unmaintained" advisories
# for those native deps should be added to `ignore` below with a comment.
# Currently no known advisories require exceptions (2026-06-02).
ignore = []

[licenses]
version = 2
allow = [
  "MIT",
  "MIT-0",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "CC0-1.0",
  "Zlib",
  "MPL-2.0",
  "CDLA-Permissive-2.0",
  # whisper-rs 0.13.2 and whisper-rs-sys 0.11.1 are published under the
  # Unlicense (public-domain-equivalent, OSI-approved permissive). Only
  # pulled in under the opt-in `whisper` feature. Documented per AC7.
  "Unlicense",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
  # Crates that have caused real-world soundness or supply-chain incidents,
  # or whose usage is a strong smell in any new project.
  { crate = "openssl", reason = "use rustls; avoid native OpenSSL dependency unless absolutely required" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
